<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3rd Grade Math Hero: Daily Edition</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background: #f0f4f8; margin: 0; padding: 20px; color: #333; }
        .header { background: #4a90e2; color: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .stats-bar { display: flex; justify-content: space-around; background: white; padding: 10px; border-radius: 10px; margin-bottom: 20px; font-weight: bold; }
        .card { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 500px; margin: 0 auto; }
        #timer { font-size: 32px; color: #e74c3c; margin: 10px 0; }
        .streak-fire { color: #ff5722; font-size: 1.2em; }
        input { font-size: 28px; width: 140px; padding: 10px; border: 3px solid #4a90e2; border-radius: 10px; text-align: center; margin: 20px 0; outline: none; }
        button { background: #4caf50; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { background: #45a049; transform: scale(1.05); }
        .question { font-size: 26px; font-weight: bold; margin: 20px 0; min-height: 40px; }
    </style>
</head>
<body>

<div class="header">
    <h1>🌟 Math Hero 🌟</h1>
    <p>20 Minutes a Day Keeps the Math Monster Away!</p>
</div>

<div class="stats-bar">
    <div>Points: <span id="points">0</span></div>
    <div>Streak: <span class="streak-fire">🔥</span> <span id="streak">0</span> Days</div>
</div>

<div class="card" id="main-box">
    <div id="setup-screen">
        <p>Complete your 20-minute daily session to keep your streak alive!</p>
        <button onclick="startSession()">Start Daily Practice</button>
    </div>

    <div id="game-screen" style="display:none;">
        <div id="timer">20:00</div>
        <p id="instruction" style="color:#7f8c8d;"></p>
        <div id="question" class="question"></div>
        <input type="number" id="answer-input" onkeypress="if(event.key==='Enter') check()">
        <br>
        <button onclick="check()">Submit</button>
    </div>
</div>

<script>
    let score = 0;
    let timeLeft = 1200; // 20 minutes
    let correctValue;
    let timerRef;

    // Load Stats & Streak
    window.onload = function() {
        const today = new Date().toDateString();
        const lastDate = localStorage.getItem('math_last_date');
        let streak = parseInt(localStorage.getItem('math_streak')) || 0;

        if (lastDate === today) {
            showFinished();
        } else {
            // Check if streak is broken (missed more than 1 day)
            if (lastDate) {
                const last = new Date(lastDate);
                const diff = (new Date() - last) / (1000 * 60 * 60 * 24);
                if (diff > 2) streak = 0; // Reset streak if missed a full day
            }
        }
        document.getElementById('streak').innerText = streak;
    };

    function startSession() {
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        nextQuestion();
        timerRef = setInterval(updateTimer, 1000);
    }

    function updateTimer() {
        timeLeft--;
        let m = Math.floor(timeLeft / 60);
        let s = timeLeft % 60;
        document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
        if (timeLeft <= 0) finish();
    }

    function nextQuestion() {
        const input = document.getElementById('answer-input');
        const q = document.getElementById('question');
        const inst = document.getElementById('instruction');
        input.value = "";
        input.focus();

        const mode = Math.floor(Math.random() * 3);

        if (mode === 0) { // Arithmetic
            let a = Math.floor(Math.random() * 100);
            let b = Math.floor(Math.random() * 100);
            inst.innerText = "Addition Power:";
            q.innerText = `${a} + ${b} = ?`;
            correctValue = a + b;
        } 
        else if (mode === 1) { // 5-Digit Ordering
            let n = Array.from({length: 3}, () => Math.floor(Math.random() * 80000) + 10000);
            inst.innerText = "Which is the SMALLEST?";
            q.innerText = n.join(" | ");
            correctValue = Math.min(...n);
        } 
        else { // Patterns (Zero-Starting)
            const step = [2, 5, 10][Math.floor(Math.random() * 3)];
            const isForward = Math.random() > 0.5;
            let start = (Math.floor(Math.random() * 10) + 5) * step;

            if (isForward) {
                inst.innerText = `Count UP by ${step}s:`;
                q.innerText = `${start}, ${start + step}, ${start + (step*2)}, ___`;
                correctValue = start + (step * 3);
            } else {
                inst.innerText = `Count DOWN by ${step}s:`;
                q.innerText = `${start}, ${start - step}, ${start - (step*2)}, ___`;
                correctValue = start - (step * 3);
            }
        }
    }

    function check() {
        const userVal = parseInt(document.getElementById('answer-input').value);
        if (userVal === correctValue) {
            score += 10;
            document.getElementById('points').innerText = score;
            nextQuestion();
        } else {
            alert("Keep going! Try the next one.");
            nextQuestion();
        }
    }

    function finish() {
        clearInterval(timerRef);
        const today = new Date().toDateString();
        const lastDate = localStorage.getItem('math_last_date');
        let streak = parseInt(localStorage.getItem('math_streak')) || 0;

        // Only increase streak once per day
        if (lastDate !== today) {
            streak++;
            localStorage.setItem('math_streak', streak);
            localStorage.setItem('math_last_date', today);
        }
        showFinished();
    }

    function showFinished() {
        document.getElementById('main-box').innerHTML = `
            <h2>Amazing Work! 🏆</h2>
            <p>You finished your 20-minute daily practice.</p>
            <p>Come back tomorrow to keep your streak alive!</p>
        `;
    }
</script>

</body>
</html>
